{% extends 'base.html' %}
{% block content %}
<h3 class="mb-3">My Reported Cases</h3>
<div class="row">
    {% for case in cases %}
    <div class="col-md-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ case.name }}</h5>
                <span class="badge bg-secondary">{{ case.get_status_display }}</span>
                <p class="card-text mt-2 small">{{ case.last_seen_location }}</p>
                <a href="{% url 'case_detail' case.id %}" class="btn btn-sm btn-outline-primary">View Details</a>
            </div>
        </div>
    </div>
    {% empty %}
    <p>You haven't registered any cases yet.</p>
    {% endfor %}
</div>
{% endblock %}
