{% extends 'base.html' %}
{% block title %}Sign In — FINDLOST{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="mb-3">Sign In</h3>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>
</div>
{% endblock %}
